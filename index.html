<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAG STORE – Payment Page</title>
<meta name="description" content="TAG STORE – Men's Wear Payment Page">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-pattern"></div>

  <main class="page">

    <!-- ===== Brand ===== -->
    <header class="brand">
      <svg class="crown" viewBox="0 0 60 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M4 34 L4 14 L16 24 L30 4 L44 24 L56 14 L56 34 Z"
              fill="none" stroke="currentColor" stroke-width="2.2"
              stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="4" cy="10" r="2.6" fill="currentColor"/>
        <circle cx="30" cy="4" r="3" fill="currentColor"/>
        <circle cx="56" cy="10" r="2.6" fill="currentColor"/>
      </svg>
      <h1 class="brand-name">TAG STORE</h1>
      <p class="brand-sub">MEN'S WEAR</p>
      <span class="dot"></span>
    </header>

    <!-- ===== Payment Methods ===== -->
    <section class="section" aria-labelledby="methods-heading">
      <h2 id="methods-heading" class="section-label">Payment Methods</h2>

      <div class="ticket-grid">

        <article class="ticket">
          <p class="ticket-label">Instapay</p>
          <p class="ticket-name">Abo Malika</p>
          <p class="ticket-num" data-number="01116963100">0111 696 3100</p>
          <button class="copy-btn" data-copy="01116963100" type="button">Copy</button>
          <img src="card1-instapay-qr.jpg" alt="Instapay QR Code" class="ticket-qr">
        </article>

        <article class="ticket">
          <p class="ticket-label">Etisalat Cash</p>
          <p class="ticket-name">Abo Malika</p>
          <p class="ticket-num" data-number="01116963100">0111 696 3100</p>
          <button class="copy-btn" data-copy="01116963100" type="button">Copy</button>
          <img src="card2-etisalat-qr.jpg" alt="Etisalat Cash QR Code" class="ticket-qr">
        </article>

        <article class="ticket">
          <p class="ticket-label">Instapay</p>
          <p class="ticket-name">Halim</p>
          <p class="ticket-num" data-number="01000462112">0100 046 2112</p>
          <button class="copy-btn" data-copy="01000462112" type="button">Copy</button>
          <img src="card3-instapay-qr.jpg" alt="Instapay QR Code" class="ticket-qr">
        </article>

        <article class="ticket">
          <p class="ticket-label">Vodafone Cash</p>
          <p class="ticket-name">Halim</p>
          <p class="ticket-num" data-number="01000462112">0100 046 2112</p>
          <button class="copy-btn" data-copy="01000462112" type="button">Copy</button>
          <img src="card4-vodafone-qr.jpg" alt="Vodafone Cash QR Code" class="ticket-qr">
        </article>

      </div>
    </section>

    <span class="dot"></span>

    <!-- ===== Follow Us ===== -->
    <section class="section" aria-labelledby="follow-heading">
      <h2 id="follow-heading" class="section-label">Follow Us</h2>

      <div class="ticket-grid ticket-grid-2">

        <article class="ticket">
          <p class="ticket-label">TikTok</p>
          <a class="copy-btn" href="https://www.tiktok.com/@mhalim5030?_r=1&_t=ZS-97ppYDa4ezk" target="_blank" rel="noopener">Visit Page</a>
          <img src="tiktok-qr.jpg" alt="TAG STORE TikTok QR Code" class="ticket-qr">
        </article>

        <article class="ticket">
          <p class="ticket-label">WhatsApp</p>
          <a class="copy-btn" href="https://chat.whatsapp.com/KIsJklBeb3237V4XMBPYWQ?mode=gi_t" target="_blank" rel="noopener">Join Group</a>
          <img src="whatsapp-qr.jpg" alt="TAG STORE WhatsApp Group QR Code" class="ticket-qr">
        </article>

      </div>
    </section>

    <!-- ===== Footer ===== -->
    <footer class="footer">
      <p class="footer-text">TAG &middot; MEN'S WEAR</p>
      <span class="dot"></span>
    </footer>

  </main>

  <!-- Toast -->
  <div id="toast" class="toast" role="status" aria-live="polite">Copied</div>

  <script src="script.js"></script>
</body>
</html>
